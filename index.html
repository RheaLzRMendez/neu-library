<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEU Library</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
  <div class="overlay">
    <div class="portal-box">
      <!-- Logo at the top -->
      <div class="logo">
        <img src="logo.png" alt="NEU Logo">
      </div>

      <!-- Main title + subtitle -->
      <h1 class="main-title">NEU Library</h1>
      <p class="portal-subtitle">Portal</p>

      <div class="role-select">
        <label><input type="radio" name="role" value="student" checked> Student</label>
        <label><input type="radio" name="role" value="admin"> Admin</label>
      </div>
      <script>
        const overlay = document.querySelector(".overlay");
        const roleRadios = document.querySelectorAll('input[name="role"]');

        roleRadios.forEach(radio => {
          radio.addEventListener("change", () => {
            if (radio.value === "student") {
              overlay.classList.remove("admin-bg");
              overlay.classList.add("student-bg");
            } else if (radio.value === "admin") {
              overlay.classList.remove("student-bg");
              overlay.classList.add("admin-bg");
            }
          });
        });
      </script>

      <!-- Google Sign-In button -->
      <div id="g_id_onload"
           data-client_id="352578504822-ofb38o7di4taohp8rq3errihgv7hv95k.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard"></div>

      <p id="noteText" class="note">Authorized NEU Account Only (@neu.edu.ph)</p>
      <p id="greeting" class="greeting"></p>
    </div>
  </div>

  <!-- Footer always clickable -->
  <footer class="contact-footer">
    <a href="tel:+63289315500" class="phone">☎ +63 2 8931 5500</a>
    <a href="mailto:library@neu.edu.ph" class="email">✉ library@neu.edu.ph</a>
    <a href="https://maps.app.goo.gl/JHy3Sx4JNGpDCEo68" target="_blank" class="location">📍 NEW ERA LIBRARY</a>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
